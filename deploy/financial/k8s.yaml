apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-service
  labels:
    app: financial-intelligence
spec:
  replicas: 3
  selector:
    matchLabels:
      app: financial-intelligence
  template:
    metadata:
      labels:
        app: financial-intelligence
    spec:
      containers:
      - name: financial-api
        image: finfleet/financial-intelligence:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /api/financial/cards
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/financial/cards
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 5
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: mongo-uri
---
apiVersion: v1
kind: Service
metadata:
  name: financial-api
spec:
  selector:
    app: financial-intelligence
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: financial-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: financial-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
