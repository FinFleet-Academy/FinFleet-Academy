apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: finfleet-prod
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000

---

apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: finfleet-prod
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001

---

apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: finfleet-prod
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
