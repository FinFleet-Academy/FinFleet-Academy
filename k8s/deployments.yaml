# 🚀 API GATEWAY DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: finfleet-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: finfleet/api-gateway:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: gateway-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20

---

# 🔐 AUTH SERVICE DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: finfleet-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: finfleet/auth-service:latest
        ports:
        - containerPort: 5001
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: mongo-uri
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
