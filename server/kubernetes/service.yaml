apiVersion: v1
kind: Service
metadata:
  name: finfleet-backend-svc
  namespace: finfleet-prod
  labels:
    app: finfleet-backend
spec:
  selector:
    app: finfleet-backend
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  type: ClusterIP

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finfleet-backend-ingress
  namespace: finfleet-prod
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
  - host: api.finfleetacademy.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finfleet-backend-svc
            port:
              number: 80
