apiVersion: apps/v1
kind: Deployment
metadata:
  name: finfleet-backend
  namespace: finfleet-prod
  labels:
    app: finfleet-backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finfleet-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: finfleet-backend
        tier: api
    spec:
      containers:
      - name: finfleet-backend
        image: finfleet/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: finfleet-secrets
              key: mongo-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: finfleet-secrets
              key: jwt-secret
        - name: CLIENT_URL
          valueFrom:
            configMapKeyRef:
              name: finfleet-config
              key: client-url
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: finfleet-secrets
              key: razorpay-key-id
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: finfleet-secrets
              key: razorpay-key-secret
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
      restartPolicy: Always
