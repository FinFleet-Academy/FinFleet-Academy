version: '3.8'

services:
  gateway:
    build:
      context: ./server/gateway
      dockerfile: ../Dockerfile.generic
    ports:
      - "5000:5000"
    environment:
      - GATEWAY_PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - USER_SERVICE_URL=http://user-service:5002
    networks:
      - finfleet-network

  auth-service:
    build:
      context: ./server/services/auth-service
      dockerfile: ../../Dockerfile.generic
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - finfleet-network

  user-service:
    build:
      context: ./server/services/user-service
      dockerfile: ../../Dockerfile.generic
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=${MONGO_URI}
    networks:
      - finfleet-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - finfleet-network

networks:
  finfleet-network:
    driver: bridge
